spring.application.name=On-Time Health DB

# 1. Dirección a tu base de datos (Cambié 'tu_base_de_datos' por 'mydb')
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/mydb

# 2. Tu usuario de pgAdmin (Cambié 'postgres' por 'myuser')
spring.datasource.username=myuser

# 3. Tu contraseńa real de pgAdmin (Cambié 'mypassword' por tu contraseńa secreta)
spring.datasource.password=mypassword

spring.datasource.driver-class-name=org.postgresql.Driver

# Esto hace que Spring cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true